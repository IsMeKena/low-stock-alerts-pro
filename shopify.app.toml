name = "Low Stock Alerts Pro"
client_id = ""
application_url = ""
embedded = true

[access_scopes]
scopes = "read_products,read_inventory,write_products"

[auth]
redirect_urls = [
  "https://localhost/api/auth/callback",
]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/api/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["products/create"]
  uri = "/api/webhooks/products/create"

  [[webhooks.subscriptions]]
  topics = ["products/update"]
  uri = "/api/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = ["inventory_levels/update"]
  uri = "/api/webhooks/inventory_levels/update"

[webhooks.privacy_compliance]
customer_data_request_url = "/api/webhooks/customers/data_request"
customer_deletion_url = "/api/webhooks/customers/redact"
shop_deletion_url = "/api/webhooks/shop/redact"

[pos]
embedded = false
